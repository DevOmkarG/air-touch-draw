<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>✦ NEON BRUSH STUDIO</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@400;700&display=swap');

  :root {
    --neon-cyan: #00f0ff;
    --neon-pink: #ff007b;
    --neon-glow: rgba(0, 240, 255, 0.4);
    --bg-dark: #030307;
    --surface: rgba(13, 13, 25, 0.85);
    --border: rgba(0, 240, 255, 0.12);
    --font-sans: 'Plus Jakarta Sans', sans-serif;
    --font-display: 'Space Grotesk', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg-dark);
    color: #f3f4f6;
    font-family: var(--font-sans);
    height: 100vh;
    overflow: hidden;
  }

  /* Tech Grid Overlay */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0, 240, 255, 0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 240, 255, 0.015) 1px, transparent 1px);
    background-size: 30px 30px;
    background-position: center;
    pointer-events: none;
    z-index: 1;
  }

  .app-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    z-index: 5;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .screen-hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(1.03);
  }

  /* ─── SCREEN 1: DRAWING THEMED WELCOME SCREEN ─── */
  #splashScreen {
    justify-content: center;
    align-items: center;
    padding: 30px;
    background: radial-gradient(circle at center, #090915 0%, var(--bg-dark) 100%);
  }

  .splash-container {
    text-align: center;
    z-index: 5;
    max-width: 480px;
    animation: fadeInUp 0.8s ease;
  }

  .splash-badge {
    background: rgba(0, 240, 255, 0.06);
    border: 1px solid rgba(0, 240, 255, 0.2);
    padding: 6px 16px;
    border-radius: 30px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--neon-cyan);
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 20px;
  }

  .splash-title {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 2.6rem;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .splash-desc {
    color: #9ca3af;
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 35px;
    font-weight: 300;
  }

  .start-btn {
    background: linear-gradient(135deg, var(--neon-cyan), #0072ff);
    border: none;
    color: #fff;
    font-family: var(--font-display);
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 16px 36px;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
    transition: all 0.2s ease;
  }

  .start-btn:active {
    transform: scale(0.96);
  }

  /* ─── SCREEN 2: MAIN DRAWING STUDIO ─── */
  header {
    height: 55px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  .header-logo {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
    color: #fff;
  }
  .header-logo span { color: var(--neon-cyan); }

  .workspace-layout {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
  }

  .canvas-wrapper {
    position: relative;
    flex: 1;
    background: #000;
    min-height: 0;
  }

  #drawCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  .floating-clear-trigger {
    position: absolute;
    top: 12px;
    right: 12px;
    z-index: 15;
    background: rgba(255, 0, 123, 0.15);
    border: 1px solid rgba(255, 0, 123, 0.4);
    color: #ff007b;
    padding: 8px 14px;
    font-family: var(--font-display);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    border-radius: 30px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 0 10px rgba(255, 0, 123, 0.1);
  }

  .floating-clear-trigger:active {
    background: var(--neon-pink);
    color: #fff;
  }

  /* ─── CONTROLS BOTTOM PANEL ─── */
  .control-dock {
    background: var(--surface);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    z-index: 10;
  }

  .dock-section {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .dock-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6b7280;
  }

  /* Trigger Button to Open Universal System Color Grid */
  .color-selector-wrapper {
    position: relative;
    width: 100%;
  }

  .color-trigger-btn {
    width: 100%;
    padding: 12px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  
  .color-trigger-btn:active {
    background: rgba(0, 240, 255, 0.05);
  }

  .color-preview-group {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .current-color-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #00f0ff;
    box-shadow: 0 0 10px var(--neon-cyan);
    border: 1px solid rgba(255,255,255,0.5);
    transition: background 0.2s;
  }

  .color-btn-text {
    font-size: 0.75rem;
    font-weight: 600;
    color: #e5e7eb;
  }

  #hiddenColorPicker {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }

  /* Sliders Setup */
  .sliders-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .slider-card {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    padding: 8px 10px;
  }

  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .slider-name { font-size: 0.58rem; text-transform: uppercase; color: #9ca3af; }
  .slider-monitor { font-size: 0.62rem; font-weight: 700; color: var(--neon-cyan); }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 6px var(--neon-cyan);
  }

  /* Export Button Action */
  .action-deck-row {
    display: flex;
  }

  .action-btn {
    width: 100%;
    padding: 12px 0;
    border: 1px solid rgba(0, 240, 255, 0.2);
    background: rgba(0, 240, 255, 0.03);
    color: var(--neon-cyan);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
  }
  .action-btn:active {
    background: var(--neon-cyan);
    color: #000;
  }

  /* ─── MOBILE RESPONSIVE STRUCTURES (MAX SPACE ALLOCATION) ─── */
  @media(max-width: 768px) {
    body { height: 100vh; overflow: hidden; } 
    .main { flex-direction: column; height: calc(100vh - 55px); }
    
    /* CRITICAL CHANGE: Drawing Canvas gets 80% Height Space allocation */
    .canvas-wrapper { width: 100%; height: 80vh; flex-shrink: 0; }
    
    /* Clean, non-scrollable control bar perfectly fitted into 20% viewport space */
    .control-dock { 
      width: 100%; 
      flex: 1; 
      border-left: none; 
      padding: 12px 16px;
      gap: 10px;
      overflow: hidden;
    }
    .slider-card { padding: 6px 8px; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ambient-blur {
    position: absolute;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--neon-glow) 0%, transparent 70%);
    filter: blur(40px);
    pointer-events: none;
    z-index: 2;
    opacity: 0.3;
  }
  .blur-top { top: -40px; right: -40px; }
  .blur-bottom { bottom: -40px; left: -40px; }
</style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="ambient-blur blur-top"></div>
  <div class="ambient-blur blur-bottom"></div>

  <div class="app-screen" id="splashScreen">
    <div class="splash-container">
      <div class="splash-badge">Creative Studio</div>
      <h1 class="splash-title">Neon Brush Canvas</h1>
      <p class="splash-desc">Unleash your imagination on a next-gen glowing workspace. Draw high-fidelity vibrant neon strokes smoothly with responsive, tailored touch vector parameters.</p>
      <button class="start-btn" onclick="enterWorkspace()">Start Drawing</button>
    </div>
  </div>

  <div class="app-screen screen-hidden" id="workspaceScreen">
    <header>
      <div class="header-logo">NEON<span>BRUSH</span></div>
      <div class="status-badge">
        <div class="status-dot"></div>
      </div>
    </header>

    <div class="workspace-layout">
      <div class="canvas-wrapper">
        <button class="floating-clear-trigger" onclick="clearCanvas()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Clear
        </button>
        <canvas id="drawCanvas"></canvas>
      </div>

      <div class="control-dock">
        <div class="dock-section">
          <div class="dock-label">Brush Color Pipeline</div>
          <div class="color-selector-wrapper">
            <div class="color-trigger-btn">
              <div class="color-preview-group">
                <div class="current-color-dot" id="colorDisplayNode"></div>
                <span class="color-btn-text">Choose Custom Color...</span>
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <input type="color" id="hiddenColorPicker" value="#00f0ff">
          </div>
        </div>

        <div class="sliders-grid">
          <div class="slider-card">
            <div class="slider-header">
              <span class="slider-name">Size</span>
              <span class="slider-monitor" id="lblSize">8px</span>
            </div>
            <input type="range" id="sizeTrack" min="2" max="35" value="8">
          </div>

          <div class="slider-card">
            <div class="slider-header">
              <span class="slider-name">Glow</span>
              <span class="slider-monitor" id="lblGlow">20px</span>
            </div>
            <input type="range" id="glowTrack" min="0" max="50" value="20">
          </div>
        </div>

        <div class="action-deck-row">
          <button class="action-btn" onclick="saveCanvas()">Save Artwork PNG</button>
        </div>
      </div>
    </div>
  </div>

<script>
// ─── Global State Architecture Mapping ───────────────────────────────────────
const appPipeline = {
  currentColor: '#00f0ff',
  brushSize: 8,
  glowSize: 20,
  coordX: null,
  coordY: null
};

// ─── Workspace Initializer Operations Triggers ───────────────────────────────
function enterWorkspace() {
  document.getElementById('splashScreen').classList.add('screen-hidden');
  document.getElementById('workspaceScreen').classList.remove('screen-hidden');
  setTimeout(executeCanvasSizingRoutine, 150);
}

// ─── Resolution Calibration Setup Matrices ───────────────────────────────────
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');

function executeCanvasSizingRoutine() {
  const boundingArea = canvas.parentElement;
  const w = boundingArea.clientWidth, h = boundingArea.clientHeight;

  const memCache = document.createElement('canvas');
  memCache.width = canvas.width; memCache.height = canvas.height;
  const mCtx = memCache.getContext('2d');
  if(canvas.width > 0 && canvas.height > 0) mCtx.drawImage(canvas, 0, 0);

  canvas.width = w; canvas.height = h;
  ctx.drawImage(memCache, 0, 0);
}
window.addEventListener('resize', () => setTimeout(executeCanvasSizingRoutine, 100));

// ─── Universal Color Picker Matrix System Event Receivers ────────────────────
const nativeColorPicker = document.getElementById('hiddenColorPicker');
const colorDisplayNode = document.getElementById('colorDisplayNode');

nativeColorPicker.addEventListener('input', (e) => {
  const chosenHex = e.target.value;
  appPipeline.currentColor = chosenHex;
  colorDisplayNode.style.background = chosenHex;
  colorDisplayNode.style.boxShadow = `0 0 12px ${chosenHex}`;
});

// ─── Range Sliders Synchronization Engine ─────────────────────────────────────
function registerSliderInterface(trackId, displayId, stateKey, syntaxUnit) {
  const input = document.getElementById(trackId);
  const monitor = document.getElementById(displayId);
  input.addEventListener('input', () => {
    appPipeline[stateKey] = parseInt(input.value);
    monitor.textContent = input.value + syntaxUnit;
  });
}
registerSliderInterface('sizeTrack', 'lblSize', 'brushSize', 'px');
registerSliderInterface('glowTrack', 'lblGlow', 'glowSize', 'px');

// ─── Core Compositing Neon Brush Calculation Layer ───────────────────────────
function renderNeonStrokeSegment(x1, y1, x2, y2, hexColor, width, glow) {
  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (glow > 0) {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = hexColor + '1a'; ctx.lineWidth = width + glow * 2.2;
    ctx.filter = `blur(${glow * 0.55}px)`; ctx.stroke();

    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = hexColor + '44'; ctx.lineWidth = width + glow * 1.1;
    ctx.filter = `blur(${glow * 0.25}px)`; ctx.stroke();
  }

  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = hexColor; ctx.lineWidth = width; ctx.filter = 'none';
  ctx.shadowColor = hexColor; ctx.shadowBlur = glow * 0.8; ctx.stroke();

  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.95)'; ctx.lineWidth = Math.max(1, width * 0.25);
  ctx.shadowBlur = 0; ctx.stroke();
  
  ctx.restore();
}

// ─── Touch Matrix Ingestion Coordination Mapping ─────────────────────────────
function calculateTouchPoints(evt) {
  const rect = canvas.getBoundingClientRect();
  const targetNode = evt.touches[0] || evt.changedTouches[0];
  return {
    x: targetNode.clientX - rect.left,
    y: targetNode.clientY - rect.top
  };
}

canvas.addEventListener('touchstart', (e) => {
  const pos = calculateTouchPoints(e);
  appPipeline.coordX = pos.x; appPipeline.coordY = pos.y;
});

canvas.addEventListener('touchmove', (e) => {
  if (appPipeline.coordX === null) return;
  const pos = calculateTouchPoints(e);
  
  renderNeonStrokeSegment(
    appPipeline.coordX, appPipeline.coordY, 
    pos.x, pos.y, 
    appPipeline.currentColor, appPipeline.brushSize, appPipeline.glowSize
  );
  
  appPipeline.coordX = pos.x; appPipeline.coordY = pos.y;
});

canvas.addEventListener('touchend', () => {
  appPipeline.coordX = null; appPipeline.coordY = null;
});

// ─── File Storage Operations Functions ────────────────────────────────────────
function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

document.fonts.ready.then(() => {
  // Safe validation check inside asset engine execution stacks
});

function saveCanvas() {
  const triggerLink = document.createElement('a');
  const frameBuffer = document.createElement('canvas');
  frameBuffer.width = canvas.width; frameBuffer.height = canvas.height;
  
  const fCtx = frameBuffer.getContext('2d');
  fCtx.fillStyle = '#030307'; 
  fCtx.fillRect(0, 0, frameBuffer.width, frameBuffer.height);
  fCtx.drawImage(canvas, 0, 0);
  
  triggerLink.download = 'neon-artwork-' + Date.now() + '.png';
  triggerLink.href = frameBuffer.toDataURL();
  triggerLink.click();
}
</script>
</body>
</html>
